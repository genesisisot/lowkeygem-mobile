<!DOCTYPE html>
<html>
<head>
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #000;
      color: #fff;
    }
    .icon-preview {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    canvas {
      border: 2px solid #970747;
      border-radius: 10px;
    }
    button {
      background: #970747;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h1>Lowkey Gem PWA Icons</h1>
  <p>Right-click and save each icon with the filename shown below it:</p>
  
  <div class="icon-preview">
    <div>
      <canvas id="icon192" width="192" height="192"></canvas>
      <p><strong>icon-192.png</strong></p>
      <button onclick="downloadIcon('icon192', 'icon-192.png')">Download</button>
    </div>
    <div>
      <canvas id="icon512" width="512" height="512"></canvas>
      <p><strong>icon-512.png</strong></p>
      <button onclick="downloadIcon('icon512', 'icon-512.png')">Download</button>
    </div>
    <div>
      <canvas id="appleIcon" width="180" height="180"></canvas>
      <p><strong>apple-touch-icon-180.png</strong></p>
      <button onclick="downloadIcon('appleIcon', 'apple-touch-icon-180.png')">Download</button>
    </div>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      
      // Purple gradient background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#970747');
      gradient.addColorStop(1, '#7a0539');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // Draw "LG" text
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.35}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('LG', size / 2, size / 2);
      
      // Draw small gem icon
      const gemSize = size * 0.15;
      const gemX = size / 2;
      const gemY = size * 0.75;
      
      ctx.beginPath();
      ctx.moveTo(gemX, gemY - gemSize / 2);
      ctx.lineTo(gemX + gemSize / 2, gemY);
      ctx.lineTo(gemX, gemY + gemSize / 2);
      ctx.lineTo(gemX - gemSize / 2, gemY);
      ctx.closePath();
      ctx.fillStyle = '#fbbf24';
      ctx.fill();
    }

    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Generate all icons on page load
    drawIcon(document.getElementById('icon192'));
    drawIcon(document.getElementById('icon512'));
    drawIcon(document.getElementById('appleIcon'));
  </script>
</body>
</html>
